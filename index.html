<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="PointageRH — Application de gestion du pointage des employés">
<meta name="theme-color" content="#1a56e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PointageRH">
<title>PointageRH</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --primary:#1a56e8;--primary-light:#3b74f0;--primary-dark:#1240c0;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#06b6d4;
  --bg:#f0f4ff;--surface:#fff;--surface2:#f8faff;--border:#e2e8f6;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --sb-bg:#0f172a;--sb-text:#e2e8f0;--sb-hover:rgba(26,86,232,0.15);
  --shadow:0 4px 24px rgba(15,23,42,0.08);--shadow-lg:0 8px 40px rgba(15,23,42,0.14);
  --r:12px;--rs:8px;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --sbw:240px;--sbc:68px;--tr:0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="ocean"]  {--primary:#1a56e8;--primary-light:#3b74f0;--primary-dark:#1240c0;--sb-bg:#0f172a;--bg:#f0f4ff;}
[data-theme="violet"] {--primary:#7c3aed;--primary-light:#8b5cf6;--primary-dark:#6d28d9;--sb-bg:#1e1033;--bg:#f5f3ff;}
[data-theme="foret"]  {--primary:#059669;--primary-light:#10b981;--primary-dark:#047857;--sb-bg:#052e16;--bg:#f0fdf4;}
[data-theme="rouge"]  {--primary:#dc2626;--primary-light:#ef4444;--primary-dark:#b91c1c;--sb-bg:#1c0a0a;--bg:#fff5f5;}
[data-theme="ardoise"]{--primary:#475569;--primary-light:#64748b;--primary-dark:#334155;--sb-bg:#1e293b;--bg:#f1f5f9;}
[data-theme="nuit"]   {--primary:#38bdf8;--primary-light:#7dd3fc;--primary-dark:#0ea5e9;--sb-bg:#020617;--bg:#0f172a;--surface:#1e293b;--surface2:#162032;--border:#334155;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:var(--fb);background:var(--bg);color:var(--text)}
.app{display:flex;height:100vh;overflow:hidden}
.sbo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150;backdrop-filter:blur(2px)}
.sbo.show{display:block}
/* SIDEBAR */
.sb{width:var(--sbw);background:var(--sb-bg);display:flex;flex-direction:column;transition:width var(--tr),transform var(--tr);overflow:hidden;flex-shrink:0;z-index:200;position:relative}
.sb.col{width:var(--sbc)}
@media(max-width:768px){.sb{position:fixed;top:0;left:0;height:100%;width:var(--sbw)!important;transform:translateX(-100%);box-shadow:4px 0 32px rgba(0,0,0,.3)}.sb.mob{transform:translateX(0)}.sbt{display:none!important}}
.sbh{display:flex;align-items:center;gap:12px;padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.07);min-height:72px;overflow:hidden;flex-shrink:0}
.sbl{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fh);font-weight:800;color:#fff;font-size:16px}
.sbb{color:#fff;font-family:var(--fh);font-weight:700;font-size:18px;white-space:nowrap;overflow:hidden}.sbb span{color:var(--primary-light)}
.sbt{position:absolute;right:-12px;top:72px;width:24px;height:24px;border-radius:50%;background:var(--primary);border:2px solid var(--sb-bg);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:var(--tr);z-index:201}
.sbt:hover{background:var(--primary-light)}
.sbn{flex:1;padding:12px 8px;overflow-y:auto;overflow-x:hidden}
.st{font-size:10px;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.3);padding:8px 8px 4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;transition:var(--tr)}
.sb.col .st{opacity:0}
.ni{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:var(--tr);color:var(--sb-text);white-space:nowrap;overflow:hidden;margin-bottom:2px}
.ni:hover{background:var(--sb-hover);color:#fff}.ni.active{background:var(--primary);color:#fff}
.nic{width:20px;text-align:center;flex-shrink:0;font-size:15px}.nil{font-size:14px;font-weight:500;overflow:hidden}
.sbf{padding:12px 8px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sbu{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:10px;overflow:hidden}
.ua{width:32px;height:32px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.un{color:#fff;font-size:13px;font-weight:600;white-space:nowrap}.ur{color:rgba(255,255,255,.4);font-size:11px;white-space:nowrap}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px;flex-shrink:0;box-shadow:0 1px 8px rgba(15,23,42,.04)}
.tbl{display:flex;align-items:center;gap:12px}.ptitle{font-family:var(--fh);font-weight:700;font-size:18px}
.tbr{display:flex;align-items:center;gap:8px}
.tbb{height:36px;min-width:36px;padding:0 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:var(--tr);position:relative;flex-shrink:0;font-size:13px;font-weight:700;font-family:var(--fb)}
.tbb:hover{background:var(--bg);color:var(--primary);border-color:var(--primary)}
.ham{display:none}@media(max-width:768px){.ham{display:flex}}
.nbadge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--danger);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px}
.msel{display:flex;align-items:center;gap:6px}
.msel select{padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);color:var(--text);cursor:pointer;font-family:var(--fb);outline:none}
/* CARDS */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}
.ch{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ct{font-family:var(--fh);font-weight:700;font-size:15px}.cb{padding:18px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:var(--tr);white-space:nowrap;font-family:var(--fb)}
.bp{background:var(--primary);color:#fff}.bp:hover{background:var(--primary-dark);transform:translateY(-1px)}
.bo{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}.bo:hover{background:var(--primary);color:#fff}
.bd{background:var(--danger);color:#fff}.bd:hover{background:#dc2626}
.bg2{background:transparent;color:var(--text2);border:1px solid var(--border)}.bg2:hover{background:var(--bg);color:var(--text)}
.bsm{padding:5px 10px;font-size:12px}.bic{padding:7px}
/* FORMS */
.fg{margin-bottom:14px}.fl{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;background:var(--surface);color:var(--text);transition:var(--tr);font-family:var(--fb);outline:none}
.fc:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,232,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.fr{grid-template-columns:1fr}}
/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px;display:flex;align-items:center;gap:14px;transition:var(--tr);box-shadow:var(--shadow)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.sic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sv{font-family:var(--fh);font-weight:800;font-size:26px;line-height:1}.sl{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500}
.pb{background:var(--border);border-radius:20px;height:6px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:20px;transition:width .8s ease}
/* TABLE */
.tw{overflow:auto;max-height:calc(100vh - 270px)}.ti{min-width:1100px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:10}
thead th{background:var(--surface2);padding:9px 11px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--primary)}
tbody tr{border-bottom:1px solid var(--border);transition:var(--tr)}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:9px 11px;font-size:13px;vertical-align:middle;white-space:nowrap}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tok{background:rgba(16,185,129,.12);color:#059669}.tko{background:rgba(239,68,68,.12);color:#dc2626}
.twn{background:rgba(245,158,11,.12);color:#d97706}.tinf{background:rgba(6,182,212,.12);color:#0891b2}
.tbl2{background:rgba(26,86,232,.12);color:var(--primary)}.tgr{background:rgba(100,116,139,.12);color:#475569}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:var(--tr)}
.mov.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(15,23,42,.25);transform:scale(.95) translateY(20px);transition:var(--tr)}
.mov.open .modal{transform:scale(1) translateY(0)}.mlg{max-width:800px}
.mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mt2{font-family:var(--fh);font-weight:700;font-size:17px}
.mx{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.mx:hover{background:var(--danger);color:#fff}
.mb2{padding:22px;overflow-y:auto;flex:1}.mf{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.sbox{position:relative;flex:1;min-width:150px}
.sbox input{width:100%;padding:7px 12px 7px 32px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:var(--tr);font-family:var(--fb)}
.sbox input:focus{border-color:var(--primary)}.sbox i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px}
.tabb{display:flex;gap:4px;padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border)}
.tabbt{padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;transition:var(--tr);white-space:nowrap;font-family:var(--fb)}
.tabbt:hover{color:var(--primary)}.tabbt.active{color:var(--primary);border-bottom-color:var(--primary)}
/* DASHBOARD */
.cgrid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.cgrid{grid-template-columns:1fr}}
.ca{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px}
.cat{font-family:var(--fh);font-weight:700;font-size:14px;margin-bottom:14px}
.bc{display:flex;align-items:flex-end;gap:5px;height:110px}
.bi{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{width:100%;border-radius:5px 5px 0 0;transition:height .5s ease;min-height:4px}
.bl{font-size:9px;color:var(--text3)}.bv{font-size:9px;font-weight:700;color:var(--text2)}
.dw{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:8px;font-size:12px}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Effectif bars */
.svc-block{margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.svc-block-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.svc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.svc-name{font-weight:700;font-size:13px}
.svc-total{font-family:var(--fh);font-weight:800;font-size:14px;padding:2px 10px;border-radius:20px}
.svc-fct-list{padding:8px 14px;display:flex;flex-direction:column;gap:5px}
.fct-row{display:flex;align-items:center;gap:10px}
.fct-label{font-size:12px;color:var(--text2);min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fct-bar-bg{flex:1;height:7px;background:var(--border);border-radius:20px;overflow:hidden}
.fct-bar-fill{height:100%;border-radius:20px;transition:width .7s ease}
.fct-val{font-size:12px;font-weight:700;min-width:20px;text-align:right}
/* TOP5 */
.t5t{width:100%;border-collapse:collapse}
.t5t thead th{background:var(--surface2);padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap}
.t5t tbody tr{border-bottom:1px solid var(--border)}.t5t tbody tr:nth-child(even){background:var(--surface2)}
.t5t tbody td{padding:8px 10px;font-size:12px;vertical-align:middle}
.t5r{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.bpw{display:flex;align-items:center;gap:8px}.bpb{flex:1;height:8px;background:var(--border);border-radius:20px;overflow:hidden;min-width:50px}
.bpf{height:100%;border-radius:20px;transition:width .8s ease}.bpv{font-size:11px;font-weight:700;min-width:22px;text-align:right}
/* POINTAGE */
.ptc{overflow:auto;max-height:calc(100vh - 210px)}.ptt{border-collapse:collapse}
.ptt th,.ptt td{border:1px solid var(--border);padding:5px 7px;font-size:11px;white-space:nowrap;vertical-align:middle}
.ptt thead th{background:var(--surface2);position:sticky;top:0;z-index:5;font-size:10px}
.cf{position:sticky;left:0;z-index:6;background:var(--surface)}.ptt thead .cf{z-index:8}
.ptcell{min-width:50px;text-align:center;cursor:pointer;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:600;transition:var(--tr)}
.ptcell:hover{opacity:.8;transform:scale(1.05)}.ptcell.locked{cursor:not-allowed;opacity:.7}
.dh{display:flex;flex-direction:column;align-items:center;gap:1px}
.dn{font-size:12px;font-weight:700}.dd{font-size:9px;font-weight:500;opacity:.7}
.day-lock-btn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;border:none;cursor:pointer;font-size:9px;margin-top:3px;transition:var(--tr)}
.day-lock-btn.locked{background:rgba(239,68,68,.15);color:#dc2626}.day-lock-btn.unlocked{background:rgba(16,185,129,.15);color:#059669}
/* SETTINGS */
.sgrid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.sgrid2{grid-template-columns:1fr}}
.thgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.thcard{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:var(--tr)}.thcard.active{border-color:var(--primary)}
.thp{height:44px;display:flex}.thps{width:30%}.thpm{flex:1}
.thn{padding:6px;font-size:11px;font-weight:600;text-align:center;background:var(--surface);border-top:1px solid var(--border)}
.pl{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:200px;overflow-y:auto}
.pi{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)}
.pn{font-size:13px;font-weight:500}.padd{display:flex;gap:8px}
.ptpc{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);margin-bottom:8px;flex-wrap:wrap}
.ptcd{width:28px;height:28px;border-radius:8px;flex-shrink:0;cursor:pointer;border:2px solid rgba(0,0,0,.1)}
/* PWD SCREEN */
.pwd-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh}
.pwd-box{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-lg);padding:40px;max-width:400px;width:100%;text-align:center}
.pwd-icon{width:64px;height:64px;border-radius:20px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff}
/* TOAST */
.toc{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 14px;border-radius:10px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;min-width:240px;animation:sIn .3s ease;background:var(--surface);border:1px solid var(--border);color:var(--text)}
.toast.success{border-left:4px solid var(--success)}.toast.error{border-left:4px solid var(--danger)}.toast.info{border-left:4px solid var(--info)}
@keyframes sIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.flex{display:flex}.g2{gap:8px}.g3{gap:12px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mb3{margin-bottom:12px}
.sm{font-size:13px}.xs{font-size:11px}.bld{font-weight:700}
.cp{color:var(--primary)}.cok{color:var(--success)}.cko{color:var(--danger)}.cm{color:var(--text2)}
.hidden{display:none!important}.wf{width:100%}
@media(max-width:800px){.dash2col{grid-template-columns:1fr!important}}
</style>
</head>
<body data-theme="ocean">
<div class="sbo" id="sbo" onclick="closeMob()"></div>
<div class="app">
  <aside class="sb" id="sb">
    <div class="sbh"><div class="sbl">PR</div><div class="sbb">Pointage<span>RH</span></div></div>
    <div class="sbt" id="sbt" onclick="toggleSB()"><i class="fa fa-chevron-left" id="sbic"></i></div>
    <nav class="sbn">
      <div class="st" id="st-main">PRINCIPAL</div>
      <div class="ni active" onclick="go('dashboard')" id="nav-dashboard"><span class="nic"><i class="fa fa-chart-line"></i></span><span class="nil" id="lbl-dashboard">Tableau de bord</span></div>
      <div class="ni" onclick="go('employes')" id="nav-employes"><span class="nic"><i class="fa fa-users"></i></span><span class="nil" id="lbl-employes">Liste Employés</span></div>
      <div class="ni" onclick="go('pointage')" id="nav-pointage"><span class="nic"><i class="fa fa-clock"></i></span><span class="nil" id="lbl-pointage">Pointage</span></div>
      <div class="ni" onclick="go('absences')" id="nav-absences"><span class="nic"><i class="fa fa-calendar-xmark"></i></span><span class="nil" id="lbl-absences">Suivi Absences</span></div>
      <div class="st" id="st-config" style="margin-top:8px">CONFIGURATION</div>
      <div class="ni" onclick="go('parametres')" id="nav-parametres"><span class="nic"><i class="fa fa-gear"></i></span><span class="nil" id="lbl-parametres">Paramètres</span></div>
    </nav>
    <div class="sbf"><div class="sbu"><div class="ua">AD</div><div><div class="un">Administrateur</div><div class="ur">Super Admin</div></div></div></div>
  </aside>
  <div class="main">
    <div class="topbar">

function dim(m,y){return new Date(y,m,0).getDate()}
function dow(d,m,y){return new Date(y,m-1,d).getDay()}
function isFer(d,m,y){return feries.includes(`${y}-${pad(m)}-${pad(d)}`)}
function pad(n){return String(n).padStart(2,'0')}
function isLocked(d,m,y){return !!lockedDays[`${y}-${pad(m)}-${pad(d)}`]}
function anc(de,da=''){
  const s=new Date(de),e=da?new Date(da):new Date();
  let yr=e.getFullYear()-s.getFullYear(),mo=e.getMonth()-s.getMonth(),d=e.getDate()-s.getDate();
  if(d<0){mo--;d+=new Date(e.getFullYear(),e.getMonth(),0).getDate()}
  if(mo<0){yr--;mo+=12}
  return`${yr}${T('yr')} ${mo}${T('mo')} ${d}${T('dy')}`
}
function gM(){return parseInt(document.getElementById('gM').value)}

function mPTfull(e,m,y){

  for(let d=1;d<=dim(m,y);d++){const v=ptd[`${e.mat}-${y}-${m}-${d}`];if(v&&c[v]!==undefined)c[v]++;}
  c._abs=PT_TYPES.filter(t=>t.abs).reduce((s,t)=>s+c[t.k],0);
  c._pres=c['P']||0;return c;
}
function nxtId(){return Math.max(0,...employees.map(e=>e.id))+1}
function cmpAN(va,vb){
  const re=/^([A-Za-zÀ-öø-ÿ\s]*)(\d*)(.*)$/;
  const ma=String(va).match(re),mb=String(vb).match(re);
  const pa=(ma[1]||'').toUpperCase(),pb=(mb[1]||'').toUpperCase();
  if(pa!==pb)return pa.localeCompare(pb,'fr',{sensitivity:'base'});
  const na=parseInt(ma[2]||'0'),nb=parseInt(mb[2]||'0');
  if(na!==nb)return na-nb;
  return String(ma[3]||'').localeCompare(String(mb[3]||''));
}

function toast(msg,type='info',dur=3200){
  const tc=document.getElementById('toc');
  if(!tc)return;
  const ic={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
  const cl={success:'#10b981',error:'#ef4444',info:'#06b6d4'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<i class="fa ${ic[type]||'fa-circle-info'}" style="color:${cl[type]||'#06b6d4'}"></i>${msg}`;
  tc.appendChild(t);
  setTimeout(()=>{t.style.animation='sIn .3s ease reverse';setTimeout(()=>t.remove(),300);},dur);
}

function rDash(){
  const m=gM(),y=gY(),lbl=T('months')[m-1]+' '+y;
  const ac=actifs(),ina=employees.filter(e=>e.st==='Inactif');
  const H=ac.filter(e=>e.sx==='M').length,F=ac.filter(e=>e.sx==='F').length;

    <div class="sc"><div class="sic" style="background:rgba(6,182,212,.1);color:#06b6d4"><i class="fa fa-venus-mars"></i></div><div><div class="sv" style="color:#06b6d4">${H}H/${F}F</div><div class="sl">${T('genderSplit')}</div></div></div>

function initBars(){
  const el=document.getElementById('dbars');if(!el)return;
  const m=gM(),y=gY();const sp={};SERVICES.forEach(s=>sp[s]=0);
  actifs().forEach(e=>{if(sp[e.svc]===undefined)sp[e.svc]=0;sp[e.svc]+=mPTfull(e,m,y)._pres;});
  const mx=Math.max(1,...Object.values(sp));
  const cols=['var(--primary)','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'];
  el.innerHTML=Object.entries(sp).map(([s,v],i)=>`<div class="bi"><div class="bv">${v}</div><div class="bar" style="height:${Math.max(v/mx*100,4)}%;background:${cols[i%cols.length]}"></div><div class="bl">${s.substring(0,4)}</div></div>`).join('');
}

let eQ='',eFil={svc:'',cnt:''},eSort={col:'nom',asc:true};
let empEditMode=false; /* Verrouillage modification employés */

function rEmps(){
  const m=gM(),y=gY(),FR=lang==='fr';
  let list=[...employees];
  if(!cfg.showInact)list=list.filter(e=>e.st==='Actif');
  if(eFil.svc)list=list.filter(e=>e.svc===eFil.svc);
  if(eFil.cnt)list=list.filter(e=>e.cnt===eFil.cnt);
  if(eQ){const q=eQ.toLowerCase();list=list.filter(e=>[e.nom,e.pre,e.mat,e.badge,e.svc].some(v=>(v||'').toLowerCase().includes(q)));}

      </div>`
    :`<div style="padding:8px 14px;background:rgba(239,68,68,.05);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)">
          <i class="fa fa-lock" style="color:#ef4444"></i> ${FR?'Modifications verrouillées — saisissez le code pour modifier':'Edits locked — enter code to edit'}
        </div>
        <button class="btn bp bsm" onclick="askEmpEditUnlock()">

      <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;white-space:nowrap">

        <th>${T('col_eq')}</th>
        <th>${T('col_badge')}</th>
        <th onclick="srtE('st')">${T('col_st')}</th>
        <th>${T('col_end')}</th>

function srtE(c){if(eSort.col===c)eSort.asc=!eSort.asc;else{eSort.col=c;eSort.asc=true;}render('employes')}

function askEmpEditUnlock(){
  const FR=lang==='fr';
  document.getElementById('mTit').textContent=FR?'🔓 Déverrouiller les employés':'🔓 Unlock employee edits';
  document.getElementById('modal').className='modal';
  document.getElementById('mBod').innerHTML=`
    <p class="sm cm mb3">${FR?'Saisissez le mot de passe pour pouvoir modifier ou supprimer des employés.':'Enter the password to edit or delete employees.'}</p>
    <div class="fg"><label class="fl">${T('lbl_curPwd')}</label>
      <input type="password" class="fc" id="empPwd" placeholder="••••" style="letter-spacing:4px;font-size:18px;text-align:center" onkeydown="if(event.key==='Enter')doEmpEditUnlock()">
    </div>
    <div id="empPwdErr" style="color:#ef4444;font-size:12px;display:none"><i class="fa fa-circle-xmark"></i> ${T('wrongPwd')}</div>`;
  document.getElementById('mFtr').innerHTML=`
    <button class="btn bg2" onclick="closeM()">${T('cancel')}</button>
    <button class="btn bp" onclick="doEmpEditUnlock()"><i class="fa fa-lock-open"></i> ${FR?'Déverrouiller':'Unlock'}</button>`;
  openM();
  setTimeout(()=>document.getElementById('empPwd')?.focus(),100);
}

function doEmpEditUnlock(){
  const FR=lang==='fr';
  if(document.getElementById('empPwd')?.value!==cfg.pwd){
    const err=document.getElementById('empPwdErr');
    if(err){err.style.display='block';setTimeout(()=>err.style.display='none',2000);}
    return;
  }
  empEditMode=true;
  closeM();
  render('employes');
  toast(FR?'Mode modification employés activé ✓':'Employee edit mode activated ✓','success');
}

function saveE(id){
  const g=i=>document.getElementById('f'+i)?.value||'';
  const nom=g(1).trim(),pre=g(2).trim();
  if(!nom||!pre){toast(T('msg_nameReq'),'error');return}
  const d={civ:g(0),nom:nom.toUpperCase(),pre,mat:g(3),sx:g(4),badge:g(5),svc:g(6),fct:g(7),sfct:g(8),eq:g(9),cnt:g(10),st:g(11),de:g(12),da:g(13)};
  if(id){const i=employees.findIndex(e=>e.id===id);if(i>=0)employees[i]={...employees[i],...d};toast(T('msg_empSaved'),'success');}
  else{employees.push({id:nxtId(),...d});toast(T('msg_empAdded'),'success');}
  employees.sort((a,b)=>{const r=cmpAN(a.nom,b.nom);return r!==0?r:cmpAN(a.mat,b.mat);});
  closeM();render('employes');
}
function delE(id){const e=employees.find(x=>x.id===id);if(!confirm(`${T('msg_empDel2')} ${e.nom} ${e.pre} ?`))return;employees=employees.filter(x=>x.id!==id);toast(T('msg_empDeleted'),'info');render('employes')}

/* ═══════════════════════════════════
   POINTAGE
═══════════════════════════════════ */
let ptFil={svc:'',eq:'',shift:'',date:''},ptQ='';
/* Mode modification individuelle déverrouillé par mot de passe */
let ptEditMode = false;

function rPT(){
  const m=gM(),y=gY(),days=dim(m,y);
  const FR=lang==='fr';
  let list=actifs();
  if(ptFil.svc)  list=list.filter(e=>e.svc===ptFil.svc);
  if(ptFil.eq)   list=list.filter(e=>e.eq===ptFil.eq);
  if(ptFil.shift){
    list=list.filter(e=>{
      for(let d=1;d<=days;d++){
        if(shiftData[e.mat+'-'+y+'-'+m+'-'+d]===ptFil.shift)return true;
      }
      return false;
    });
  }
  if(ptQ){const q=ptQ.toLowerCase();list=list.filter(e=>[e.nom,e.pre,e.mat,e.svc,e.fct].some(v=>(v||'').toLowerCase().includes(q)));}

  /* Si un jour est sélectionné : afficher seulement ce jour */
  let filtDay=0;
  if(ptFil.date){
    const parts=ptFil.date.split('-');
    if(parts.length===3&&parseInt(parts[1])===m&&parseInt(parts[0])===y){
      filtDay=parseInt(parts[2]);
    }
  }
  /* Colonnes à afficher */
  const dArr=filtDay>0?[filtDay]:Array.from({length:days},(_,i)=>i+1);

  const leg=PT_TYPES.map(t=>`<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:${t.col}18;color:${t.col};margin:2px"><span style="font-weight:800">${t.k}</span> = ${t.l}${t.abs?`<span style="font-size:9px;background:rgba(239,68,68,.2);color:#dc2626;padding:1px 5px;border-radius:10px;margin-left:3px">≡ abs.</span>`:''}</span>`).join('');

  /* Barre mode modification */
  const editBar=ptEditMode
    ?`<div style="padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(16,185,129,.08);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#059669"><i class="fa fa-pencil"></i> ${FR?'Mode modification activé — cliquez une cellule':'Edit mode ON — click a cell'}</div>
        <button class="btn bd bsm" onclick="ptEditMode=false;render('pointage')"><i class="fa fa-lock"></i> ${FR?'Verrouiller':'Lock'}</button>
      </div>`
    :`<div style="padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(239,68,68,.05);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)"><i class="fa fa-lock" style="color:#ef4444"></i> ${FR?'Modifications verrouillées':'Edits locked'}</div>
        <button class="btn bp bsm" onclick="askEditUnlock()"><i class="fa fa-lock-open"></i> ${FR?'Déverrouiller':'Unlock'}</button>
      </div>`;

  /* Info filtre date actif */
  const dateInfo=filtDay>0
    ?`<div style="padding:6px 14px;border-bottom:1px solid var(--border);background:var(--primary)08;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-weight:700;color:var(--primary)"><i class="fa fa-calendar-day"></i> ${FR?'Vue du jour :':'Day view:'} <b>${filtDay}/${pad(m)}/${y}</b> — ${T('days')[dow(filtDay,m,y)]}</span>
        <button class="btn bg2 bsm" onclick="ptFil.date='';render('pointage')"><i class="fa fa-xmark"></i> ${FR?'Tout le mois':'Full month'}</button>
      </div>`
    :'';

  /* Calcul totaux pour le filtre courant */
  function calcPTFiltered(e){
    const c={};PT_TYPES.forEach(t=>c[t.k]=0);
    dArr.forEach(d=>{
      /* Si shift filtré : ne compter que les jours avec ce shift */
      if(ptFil.shift&&shiftData[e.mat+'-'+y+'-'+m+'-'+d]!==ptFil.shift) return;
      const v=ptd[e.mat+'-'+y+'-'+m+'-'+d];
      if(v&&c[v]!==undefined)c[v]++;
    });
    c._abs=PT_TYPES.filter(t=>t.abs).reduce((s,t)=>s+c[t.k],0);
    c._pres=c['P']||0;
    return c;
  }

  return`
  <div class="card" style="overflow:hidden">
    <div class="tabb">
      <button class="tabbt active" id="ptab-pt" onclick="swPT('pt')">${FR?'Pointage':'Attendance'}</button>
      <button class="tabbt" id="ptab-synth" onclick="swPT('synth')">${FR?'Synthèse 1':'Summary 1'}</button>
      <button class="tabbt" id="ptab-synth2" onclick="swPT('synth2')">${FR?'Synthèse 2':'Summary 2'}</button>
    </div>
    <div id="pt-pointage">
    <div class="toolbar">
      <div class="sbox" style="min-width:130px"><i class="fa fa-search"></i><input type="text" placeholder="${T('searchEmp')}" value="${ptQ}" oninput="ptQ=this.value;render('pointage')"></div>
      <!-- Filtre date -->
      <input type="date" class="fc" id="ptDate" style="width:auto;padding:7px 9px"
        value="${ptFil.date}" onchange="ptFil.date=this.value;render('pointage')"
        title="${FR?'Filtrer par date':'Filter by date'}">
      <select class="fc" style="width:auto;padding:7px 9px" onchange="ptFil.svc=this.value;render('pointage')">
        <option value="">${T('allSvc')}</option>${SERVICES.map(s=>`<option value="${s}"${ptFil.svc===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <select class="fc" style="width:auto;padding:7px 9px" onchange="ptFil.eq=this.value;render('pointage')">
        <option value="">${T('allTeams')}</option>${EQUIPES.map(q=>`<option value="${q}"${ptFil.eq===q?' selected':''}>Éq.${q}</option>`).join('')}
      </select>
      <select class="fc" style="width:auto;padding:7px 9px" onchange="ptFil.shift=this.value;render('pointage')">
        <option value="">${FR?'Tous shifts':'All shifts'}</option>
        ${cfg.shifts.map(s=>`<option value="${s.n}"${ptFil.shift===s.n?' selected':''}>${s.n} (${s.s}–${s.e})</option>`).join('')}
      </select>
      <!-- Réinitialiser filtres -->
      <button class="btn bg2 bsm" onclick="ptFil={svc:'',eq:'',shift:'',date:''};ptQ='';render('pointage')" title="${FR?'Réinitialiser':'Reset'}"><i class="fa fa-xmark"></i></button>
      <button class="btn bp bsm" onclick="massPT()"><i class="fa fa-wand-magic-sparkles"></i> ${T('grouped')}</button>
      <button class="btn bo bsm" onclick="expPT()"><i class="fa fa-file-excel"></i></button>
    </div>

    ${editBar}
    ${dateInfo}

    <div style="padding:8px 14px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:2px;align-items:center">
      <span style="font-weight:700;color:var(--text2);font-size:12px;margin-right:4px">${T('legend')}</span>${leg}
    </div>

    <div class="ptc">
      <table class="ptt" style="min-width:${260+dArr.length*54}px">
        <thead><tr>
          <th class="cf" style="min-width:26px">#</th>
          <th class="cf" style="min-width:72px;left:26px">${T('col_mat')}</th>
          <th style="min-width:65px">${T('col_svc2')}</th>
          <th style="min-width:130px">${T('col_nameP')}</th>
          <th style="min-width:34px">${T('col_eq2')}</th>
          <th class="cf" style="min-width:90px;left:98px">${T('col_fct2')}</th>
          ${dArr.map(d=>{
            const dw=dow(d,m,y),sun=dw===0,sat=dw===6,fer=isFer(d,m,y),lck=isLocked(d,m,y);
            const bg=fer?'background:rgba(139,92,246,.1)':sun?'background:rgba(239,68,68,.06)':sat?'background:rgba(249,115,22,.05)':'';
            return`<th style="${bg};min-width:52px;text-align:center">
              <div class="dh">
                <span class="dn">${d}</span>
                <span class="dd" style="${sun?'color:#ef4444':sat?'color:#f97316':''}">${T('days')[dw]}</span>
                <button class="day-lock-btn ${lck?'locked':'unlocked'}" onclick="toggleLock(${d},${m},${y})" title="${lck?T('unlockBtn'):'Lock'}">
                  <i class="fa ${lck?'fa-lock':'fa-lock-open'}"></i>
                </button>
              </div>
            </th>`;
          }).join('')}
          <th style="min-width:38px">P</th>
          ${PT_TYPES.filter(t=>t.abs).map(t=>`<th style="min-width:38px;color:${t.col}" title="${t.l}">${t.k}</th>`).join('')}
          <th style="min-width:44px;color:#ef4444">${T('col_absT')}</th>
        </tr></thead>
        <tbody>${list.map((e,ri)=>{
          const ct=calcPTFiltered(e);
          const cells=dArr.map(d=>{
            const dw=dow(d,m,y),sun=dw===0,sat=dw===6,fer=isFer(d,m,y),lck=isLocked(d,m,y);
            const key=e.mat+'-'+y+'-'+m+'-'+d;
            const val=ptd[key]||(sun||sat?'R':'');
            const tp=getPT(val);
            const bg=fer?'rgba(139,92,246,.04)':sun?'rgba(239,68,68,.03)':sat?'rgba(249,115,22,.02)':'';

            /* Si filtre shift actif et ce jour n'est pas ce shift → cellule grisée */
            const dayShift=shiftData[key]||'';
            const shiftMismatch=ptFil.shift&&dayShift!==ptFil.shift;
            if(shiftMismatch){
              return`<td style="padding:2px;background:var(--border)10">
                <div class="ptcell" style="background:var(--border)30;color:var(--border);cursor:default" title="${FR?'Autre shift':'Other shift'}">·</div></td>`;
            }

            let clickAction,cursor,cellStyle;
            if(lck){
              clickAction='askUnlock('+d+','+m+','+y+')';
              cursor='cursor:not-allowed';
              cellStyle=tp?'background:'+tp.col+'20;color:'+tp.col+';opacity:.6':'color:var(--border);opacity:.6';
            } else if(ptEditMode){
              clickAction='openCellEdit(\''+e.mat+'\','+y+','+m+','+d+')';
              cursor='cursor:pointer';
              cellStyle=tp?'background:'+tp.col+'20;color:'+tp.col+';outline:1.5px dashed '+tp.col+'40':'color:var(--border);outline:1.5px dashed var(--border)';
            } else {
              clickAction='notifyEditLocked()';
              cursor='cursor:default';
              cellStyle=tp?'background:'+tp.col+'20;color:'+tp.col:'color:var(--border)';
            }
            return`<td style="${bg?'background:'+bg:''};padding:2px">
              <div class="ptcell" onclick="${clickAction}" title="${tp?tp.l:lck?'🔒':'—'}" style="${cellStyle};${cursor}">
                ${val||'·'}
              </div></td>`;
          }).join('');
          const absCells=PT_TYPES.filter(t=>t.abs).map(t=>`<td style="text-align:center;font-weight:700;color:${(ct[t.k]||0)>0?t.col:'var(--text3)'}">${ct[t.k]||0}</td>`).join('');
          return`<tr>
            <td class="cf" style="font-weight:700;color:var(--text2)">${ri+1}</td>
            <td class="cf" style="left:26px"><span class="tag tbl2" style="font-size:10px">${e.mat}</span></td>
            <td style="font-size:11px">${e.svc}</td>
            <td><b>${e.nom}</b> ${e.pre}</td>
            <td style="text-align:center;font-weight:700">${e.eq}</td>
            <td class="cf" style="left:98px;font-size:11px">${e.fct}</td>
            ${cells}
            <td style="text-align:center;font-weight:800;color:#10b981">${ct._pres}</td>
            ${absCells}
            <td style="text-align:center;font-weight:800;color:#ef4444">${ct._abs}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  </div>
    </div><!-- fin pt-pointage -->
    <div id="pt-synth" class="hidden">${rSynth()}</div>
    <div id="pt-synth2" class="hidden"></div>
  </div>`;
}

/* Demander le mot de passe pour activer le mode édition individuelle */
function askEditUnlock(){
  document.getElementById('mTit').textContent = lang==='fr'?'🔓 Déverrouiller les modifications':'🔓 Unlock individual edits';
  document.getElementById('modal').className='modal';
  document.getElementById('mBod').innerHTML=`
    <p class="sm cm mb3">${lang==='fr'?'Saisissez le mot de passe pour autoriser la modification individuelle des pointages.':'Enter the password to allow individual attendance edits.'}</p>
    <div class="fg"><label class="fl">${T('lbl_curPwd')}</label>
      <input type="password" class="fc" id="editPwd" placeholder="••••" onkeydown="if(event.key==='Enter')doEditUnlock()">
    </div>
    <div id="editErr" style="color:#ef4444;font-size:12px;display:none"><i class="fa fa-circle-xmark"></i> ${T('wrongPwd')}</div>`;
  document.getElementById('mFtr').innerHTML=`
    <button class="btn bg2" onclick="closeM()">${T('cancel')}</button>
    <button class="btn bp" onclick="doEditUnlock()"><i class="fa fa-lock-open"></i> ${lang==='fr'?'Activer la modification':'Activate edits'}</button>`;
  openM();
  setTimeout(()=>document.getElementById('editPwd')?.focus(),100);
}

function doEditUnlock(){
  if(document.getElementById('editPwd')?.value!==cfg.pwd){
    const e=document.getElementById('editErr');
    if(e){e.style.display='block';setTimeout(()=>e.style.display='none',2000);}
    return;
  }
  ptEditMode=true;
  closeM();
  render('pointage');
  toast(lang==='fr'?'Mode modification individuelle activé ✓':'Individual edit mode activated ✓','success');
}

  document.getElementById('modal').className='modal';

    <div style="background:var(--primary)08;border:1px solid var(--primary)20;border-radius:10px;padding:12px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="width:40px;height:40px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0">
          ${emp?.nom?.charAt(0)||'?'}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:15px;color:var(--text)">${emp?.nom||'—'} ${emp?.pre||''}</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
            <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--primary)15;color:var(--primary)">${emp?.mat||mat}</span>
            <span style="font-size:11px;color:var(--text2)">${emp?.svc||'—'}</span>
            <span style="font-size:11px;color:var(--text2)">${emp?.fct||'—'}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--fh);font-weight:800;font-size:14px;color:var(--primary)">${d}/${pad(m)}/${y}</div>
          <div style="font-size:11px;color:var(--text2)">${T('days')[new Date(y,m-1,d).getDay()]}</div>
          ${shiftDiv}
        </div>
      </div>
      ${currDiv}
    </div>
    <p style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px">${FR?'Choisissez le nouveau statut :':'Choose the new status:'}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${PT_TYPES.map(t=>`
      <div onclick="setCellPT('${mat}',${y},${m},${d},'${t.k}')"
        style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:2px solid ${curr===t.k?t.col:'var(--border)'};background:${curr===t.k?t.col+'18':'var(--surface2)'};cursor:pointer;transition:.15s">
        <div style="width:12px;height:12px;border-radius:4px;background:${t.col};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:13px;color:${t.col}">${t.k}</div>
          <div style="font-size:10px;color:var(--text2)">${t.l}${t.abs?' <span style="color:#dc2626">≡</span>':''}</div>
        </div>
        ${curr===t.k?'<i class="fa fa-check-circle" style="color:'+t.col+';flex-shrink:0"></i>':''}
      </div>`).join('')}
      <div onclick="setCellPT('${mat}',${y},${m},${d},'')"
        style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:2px solid ${curr===''?'#ef4444':'var(--border)'};background:${curr===''?'rgba(239,68,68,.08)':'var(--surface2)'};cursor:pointer;transition:.15s">
        <div style="width:12px;height:12px;border-radius:4px;background:var(--border);flex-shrink:0"></div>
        <div>
          <div style="font-weight:800;font-size:13px;color:var(--text2)">—</div>

        ${curr===''?'<i class="fa fa-check-circle" style="color:#ef4444;flex-shrink:0"></i>':''}
      </div>
    </div>`;
  document.getElementById('mFtr').innerHTML=`<button class="btn bg2" onclick="closeM()">${T('cancel')}</button>`;
  openM();
}

function setCellPT(mat,y,m,d,val){
  const key=`${mat}-${y}-${m}-${d}`;
  if(val==='')delete ptd[key];else ptd[key]=val;
  closeM();
  render('pointage');

/* Construire les paires (employé, clé) filtrées */
function buildPTKeys(mode,date,month,year,shift,eq,svc){
  let emps=actifs();
  if(svc)emps=emps.filter(e=>e.svc===svc);
  if(eq)emps=emps.filter(e=>e.eq===eq);
  let pairs=[];
  if(mode==='day'&&date){
    const pts=date.split('-').map(Number);
    emps.forEach(e=>pairs.push({e,key:e.mat+'-'+pts[0]+'-'+pts[1]+'-'+pts[2]}));
  } else if(mode==='month'){
    const days=dim(month,year);
    for(let d=1;d<=days;d++) emps.forEach(e=>pairs.push({e,key:e.mat+'-'+year+'-'+month+'-'+d}));
  } else {
    for(let mo=1;mo<=12;mo++){const days=dim(mo,year);for(let d=1;d<=days;d++) emps.forEach(e=>pairs.push({e,key:e.mat+'-'+year+'-'+mo+'-'+d}));}
  }
  if(shift)pairs=pairs.filter(p=>shiftData[p.key]===shift);
  return{emps,pairs};
}

function calcSynth2(mode,date,month,year,shift,eq,svc){
  const FR=lang==='fr';
  const {emps,pairs}=buildPTKeys(mode,date,month,year,shift,eq,svc);
  const totalEmps=emps.length;
  if(!totalEmps) return`<div style="padding:40px;text-align:center;color:var(--text3)">${FR?'Aucune donnée':'No data'}</div>`;

  let periodLabel=mode==='day'?date:mode==='month'?T('months')[month-1]+' '+year:''+year;

  const svcLabel=svc?' | '+svc:'';
  const titleFull=(FR?'Synthèse 2 — Pointages du ':'Summary 2 — ')+periodLabel+shiftLabel+eqLabel+svcLabel;

  /* Données par employé */
  const empData={};
  emps.forEach(e=>{empData[e.mat]={e,svc:e.svc,fct:e.fct};PT_TYPES.forEach(t=>empData[e.mat][t.k]=0);});
  pairs.forEach(({e,key})=>{const v=ptd[key];if(v&&empData[e.mat]&&empData[e.mat][v]!==undefined)empData[e.mat][v]++;});
  const svcs2=svc?[svc]:SERVICES.filter(s=>emps.some(e=>e.svc===s));
  const allList=Object.values(empData);

  /* Totaux globaux par type */
  const globalTotals={};PT_TYPES.forEach(t=>globalTotals[t.k]=0);
  pairs.forEach(({key})=>{const v=ptd[key];if(v&&globalTotals[v]!==undefined)globalTotals[v]++;});
  const grandTotalAll=PT_TYPES.reduce((s,t)=>s+globalTotals[t.k],0);


  /* Tableau unique lignes=départements colonnes=types */

        <th style="padding:9px 8px;text-align:center;font-size:10px;font-weight:700;background:var(--surface2);border-bottom:2px solid var(--border);color:var(--text2)">${FR?'Effectif':'Staff'}</th>
        ${PT_TYPES.map(t=>`<th style="padding:7px 8px;text-align:center;font-size:11px;font-weight:700;background:${t.col}18;color:${t.col};border-bottom:2px solid ${t.col}55;white-space:nowrap;min-width:80px">

        </th>`).join('')}

      </tr></thead>
      <tbody>${deptRows}</tbody>
      <tfoot><tr style="border-top:3px solid var(--primary)"><td colspan="${2+PT_TYPES.length+1}" style="padding:0">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--primary)0d">
            <th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:800;color:var(--primary);text-transform:uppercase;position:sticky;left:0;background:var(--primary)0d;min-width:150px">${FR?'CUMUL TOTAL':'GRAND TOTAL'}</th>

            ${PT_TYPES.map(t=>`<th style="padding:8px 8px;text-align:center;font-size:11px;font-weight:700;color:${t.col};min-width:80px">${t.k}<br><span style="font-size:9px;opacity:.8">${t.l}</span></th>`).join('')}
            <th style="padding:9px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--primary)">Total</th>

              ${grandTotalAll?`<div style="font-size:10px;color:rgba(255,255,255,.8)">${Math.round(grandTotalAll/totalEmps*100)}%</div>`:''}
            </td>
          </tr></tbody>
        </table>
      </td></tr></tfoot>
    </table>
  </div>`;

  return`
  <div class="card s2-bloc" data-dept="__global__" style="overflow:hidden;margin-bottom:14px">

function expSynth2Excel(){
  if(typeof XLSX==='undefined'){toast('XLSX non disponible','error');return;}

  const p=getSynth2Params();
  const {emps,pairs}=buildPTKeys(p.mode,p.date,p.month,p.year,p.shift,p.eq,p.svc);
  const empData={};
  emps.forEach(e=>{empData[e.mat]={svc:e.svc,fct:e.fct};PT_TYPES.forEach(t=>empData[e.mat][t.k]=0);});
  pairs.forEach(({e,key})=>{const v=ptd[key];if(v&&empData[e.mat]&&empData[e.mat][v]!==undefined)empData[e.mat][v]++;});
  const allList=Object.values(empData);
  const svcs2=p.svc?[p.svc]:SERVICES.filter(s=>emps.some(e=>e.svc===s));
  const wb=XLSX.utils.book_new();
  function makeSheet(lst,nb){
    const fcts=[...new Set(lst.map(r=>r.fct))].sort();
    const h=[FR?'Fonction':'Position',FR?'Effectif':'Staff',...PT_TYPES.map(t=>t.k+' ('+t.l+')'),'Total','%'];
    const rows=[h];
    fcts.forEach(fct=>{
      const ef=lst.filter(r=>r.fct===fct);const eff=ef.length;
      const row=[fct,eff];let tot=0;
      PT_TYPES.forEach(t=>{const v=ef.reduce((s,r)=>s+(r[t.k]||0),0);row.push(v);tot+=v;});
      row.push(tot);row.push(eff>0?Math.round(tot/eff*100)+'%':'—');rows.push(row);
    });
    const c=[FR?'CUMUL':'TOTAL',nb];let gt=0;
    PT_TYPES.forEach(t=>{const v=lst.reduce((s,r)=>s+(r[t.k]||0),0);c.push(v);gt+=v;});
    c.push(gt);c.push(nb>0?Math.round(gt/nb*100)+'%':'—');rows.push(c);
    return XLSX.utils.aoa_to_sheet(rows);
  }
  XLSX.utils.book_append_sheet(wb,makeSheet(allList,emps.length),FR?'Global':'Global');
  svcs2.forEach(dept=>{
    const dl=allList.filter(r=>r.svc===dept);if(!dl.length)return;

  XLSX.writeFile(wb,'Synthese2_PT_'+pl+(p.shift?'_'+p.shift:'')+'.xlsx');
  toast(T('msg_export'),'success');
}

function expSynthPTExcel(){
  if(typeof XLSX==='undefined'){toast('XLSX non disponible','error');return;}
  const FR=lang==='fr';
  const p=getSynthParams();
  const {emps,pairs}=buildPTKeys(p.mode,p.date,p.month,p.year,p.shift,p.eq,p.svc);
  const wb=XLSX.utils.book_new();

  /* Onglet Synthèse 1 */
  const counts={};PT_TYPES.forEach(t=>counts[t.k]=0);
  pairs.forEach(({key})=>{const v=ptd[key];if(v&&counts[v]!==undefined)counts[v]++;});
  const s1rows=[[FR?'Type':'Type',FR?'Libellé':'Label',FR?'Nombre':'Count','%',FR?'Absence':'Absence?']];
  const total1=PT_TYPES.reduce((s,t)=>s+counts[t.k],0);
  PT_TYPES.forEach(t=>{s1rows.push([t.k,t.l,counts[t.k],emps.length>0?Math.round(counts[t.k]/emps.length*100)+'%':'—',t.abs?'Oui':'Non']);});
  s1rows.push([FR?'TOTAL':'TOTAL','',total1,'100%','']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1rows),FR?'Par Type':'By Type');

  /* Onglet global Synthèse 2 */
  const empData={};
  emps.forEach(e=>{empData[e.mat]={svc:e.svc,fct:e.fct};PT_TYPES.forEach(t=>empData[e.mat][t.k]=0);});
  pairs.forEach(({e,key})=>{const v=ptd[key];if(v&&empData[e.mat]&&empData[e.mat][v]!==undefined)empData[e.mat][v]++;});

  function makeExcelSheet(empsList,nbEmps){
    const fcts=[...new Set(empsList.map(r=>r.fct))].sort();
    const header=[FR?'Fonction':'Position',FR?'Effectif':'Staff',...PT_TYPES.map(t=>t.k+' ('+t.l+')'),'Total','Taux%'];
    const rows=[header];
    fcts.forEach(fct=>{
      const ef=empsList.filter(r=>r.fct===fct);const eff=ef.length;
      const row=[fct,eff];let tot=0;
      PT_TYPES.forEach(t=>{const v=ef.reduce((s,r)=>s+(r[t.k]||0),0);row.push(v);tot+=v;});
      row.push(tot);row.push(eff>0?Math.round(tot/eff*100)+'%':'—');rows.push(row);
    });
    const cumul=[FR?'CUMUL TOTAL':'GRAND TOTAL',nbEmps];
    let gt=0;PT_TYPES.forEach(t=>{const v=empsList.reduce((s,r)=>s+(r[t.k]||0),0);cumul.push(v);gt+=v;});
    cumul.push(gt);cumul.push(nbEmps>0?Math.round(gt/nbEmps*100)+'%':'—');rows.push(cumul);
    return XLSX.utils.aoa_to_sheet(rows);
  }

  const allList=Object.values(empData);
  XLSX.utils.book_append_sheet(wb,makeExcelSheet(allList,emps.length),FR?'Global':'Global');
  const svcs=p.svc?[p.svc]:SERVICES.filter(s=>emps.some(e=>e.svc===s));
  svcs.forEach(dept=>{
    const dl=allList.filter(r=>r.svc===dept);
    if(!dl.length)return;
    XLSX.utils.book_append_sheet(wb,makeExcelSheet(dl,dl.length),dept.substring(0,30));
  });
  let pl=p.mode==='day'?p.date:p.mode==='month'?T('months')[p.month-1]+'_'+p.year:''+p.year;
  XLSX.writeFile(wb,'Synthese_PT_'+pl+(p.shift?'_'+p.shift:'')+'.xlsx');
  toast(T('msg_export'),'success');
}

function applyMass(){
  const m=gM(),y=gY();
  const f=parseInt(document.getElementById('ptf').value),t2=parseInt(document.getElementById('ptt').value);
  const s=document.getElementById('pts').value;
  const sv=document.getElementById('ptsv').value;
  const eq=document.getElementById('pteq').value;
  const shift=document.getElementById('ptshift').value;
  let list=actifs();
  if(sv) list=list.filter(e=>e.svc===sv);
  if(eq) list=list.filter(e=>e.eq===eq);
  let skip=0;
  for(let d=f;d<=t2;d++){
    if(isLocked(d,m,y)){skip++;continue;}
    list.forEach(e=>{
      ptd[`${e.mat}-${y}-${m}-${d}`]=s;
      /* Enregistrer le shift en arrière-plan si choisi */
      if(shift) shiftData[e.mat+'-'+y+'-'+m+'-'+d]=shift;
    });
  }
  closeM();render('pointage');
  const scope=sv&&eq?`${sv}/Éq.${eq}`:sv?sv:eq?`Éq.${eq}`:(lang==='fr'?'Tous':'All');
  const shiftInfo=shift?` | Shift: ${shift}`:'';
  toast(`${s} ${T('msg_applied')} — ${list.length} emp. [${scope}${shiftInfo}], j.${f}–${t2}${skip>0?' ('+skip+' '+T('msg_locked')+')':''}`, 'success');
}

      if(tp&&tp.abs) rows.push({e,d,type:v,l:tp.l,col:tp.col,dt:`${y}-${pad(m)}-${pad(d)}`});
    }
  });
  const sum={};
  ac.forEach(e=>{const s={e,tot:0};absPT.forEach(t=>s[t.k]=0);sum[e.mat]=s;});
  rows.forEach(r=>{if(sum[r.e.mat]){sum[r.e.mat][r.type]=(sum[r.e.mat][r.type]||0)+1;sum[r.e.mat].tot++;}});
  const typeTotals={};

            <select class="fc" id="syn2_mode" style="width:auto;padding:7px 10px" onchange="updateSyn2()">
              <option value="day">${FR?'Jour J':'Day'}</option>
              <option value="month">${FR?'Mois':'Month'}</option>

          <div id="syn2_date_w">

            <input type="date" class="fc" id="syn2_date" value="${new Date().toISOString().split('T')[0]}" style="width:auto;padding:7px 10px" onchange="updateSyn2()">
          </div>

            <select class="fc" id="syn2_month" style="width:auto;padding:7px 10px" onchange="updateSyn2()">
              ${T('months').map((mn,i)=>`<option value="${i+1}"${i+1===m?' selected':''}>${mn}</option>`).join('')}

              <option value="">${T('allTeams')}</option>
              ${EQUIPES.map(q=>`<option value="${q}">Éq.${q}</option>`).join('')}
            </select>

          <div>
            <label style="font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px">${FR?'Département':'Dept.'}</label>
            <select class="fc" id="syn2_svc" style="width:auto;padding:7px 10px" onchange="updateSyn2()">
              <option value="">${FR?'Tous':'All'}</option>
              ${SERVICES.map(s=>`<option>${s}</option>`).join('')}

      </div>
    </div>
    <div id="syn2Result" class="mt3"></div>

}

function swAbs(t){
  ['det','rec','syn'].forEach(x=>{const el=document.getElementById('abs-'+x);if(el)el.classList.toggle('hidden',t!==x);});
  document.querySelectorAll('.tabbt').forEach(b=>b.classList.remove('active'));
  const tb=document.getElementById('tab-'+t);if(tb)tb.classList.add('active');
  if(t==='syn'){const r=document.getElementById('syn2Result');if(r&&!r.innerHTML.trim())updateSyn2();}
}

function fAbs(){
  const q=(document.getElementById('aQ')?.value||'').toLowerCase();
  const tp=document.getElementById('aT')?.value||'';
  const sv=document.getElementById('aS')?.value||'';
  const dt=document.getElementById('aDate')?.value||'';
  const sh=document.getElementById('aSh')?.value||'';
  document.querySelectorAll('#absBody tr').forEach(r=>{
    const ok=
      (!q  || r.dataset.n.toLowerCase().includes(q)) &&
      (!tp || r.dataset.t===tp) &&
      (!sv || r.dataset.s===sv) &&
      (!dt || r.dataset.d===dt) &&
      (!sh || r.dataset.sh===sh);
    r.classList.toggle('hidden',!ok);
  });
}

/* ════════════════════════════════
   SYNTHÈSE CROISÉE ABSENCES
   Fonctions (lignes) × Types de pointage (colonnes)
   Titre en haut avec date + shift
════════════════════════════════ */
function updateSyn2(){
  const mode=document.getElementById('syn2_mode')?.value||'day';
  const date=document.getElementById('syn2_date')?.value||new Date().toISOString().split('T')[0];
  const month=parseInt(document.getElementById('syn2_month')?.value||new Date().getMonth()+1);
  const year=parseInt(document.getElementById('syn2_year')?.value||new Date().getFullYear());
  const shift=document.getElementById('syn2_shift')?.value||'';
  const eq=document.getElementById('syn2_eq')?.value||'';
  const svc=document.getElementById('syn2_svc')?.value||'';
  /* Afficher/masquer sélecteurs selon mode */
  const dw=document.getElementById('syn2_date_w');
  const mw=document.getElementById('syn2_month_w');
  if(dw)dw.classList.toggle('hidden',mode!=='day');
  if(mw)mw.classList.toggle('hidden',mode==='year');
  const res=document.getElementById('syn2Result');
  if(res)res.innerHTML=calcSyn2(mode,date,month,year,shift,eq,svc);
}

function buildSyn2Keys(mode,date,month,year,shift,eq,svc){
  let emps=actifs();
  if(svc)emps=emps.filter(e=>e.svc===svc);
  if(eq)emps=emps.filter(e=>e.eq===eq);
  let pairs=[];
  if(mode==='day'&&date){
    const [yy,mm,dd]=date.split('-').map(Number);
    emps.forEach(e=>pairs.push({e,key:`${e.mat}-${yy}-${mm}-${dd}`}));
  } else if(mode==='month'){
    const days=dim(month,year);
    for(let d=1;d<=days;d++) emps.forEach(e=>pairs.push({e,key:`${e.mat}-${year}-${month}-${d}`}));
  } else {
    for(let mo=1;mo<=12;mo++){const days=dim(mo,year);for(let d=1;d<=days;d++) emps.forEach(e=>pairs.push({e,key:`${e.mat}-${year}-${mo}-${d}`}));}
  }
  if(shift) pairs=pairs.filter(p=>shiftData[p.key]===shift);
  const result={};
  emps.forEach(e=>{result[e.mat]={e,fct:e.fct,svc:e.svc};PT_TYPES.forEach(t=>result[e.mat][t.k]=0);});
  pairs.forEach(({e,key})=>{
    const v=ptd[key];
    if(v&&result[e.mat]&&result[e.mat][v]!==undefined) result[e.mat][v]++;
  });
  return result;
}

function calcSyn2(mode,date,month,year,shift,eq,svc){
  const FR=lang==='fr';
  const result=buildSyn2Keys(mode,date,month,year,shift,eq,svc);
  const svcs=svc?[svc]:SERVICES.filter(s=>actifs().some(e=>e.svc===s));

  /* Titre dynamique en haut */
  let periodLabel='';
  if(mode==='day') periodLabel=date;
  else if(mode==='month') periodLabel=`${T('months')[month-1]} ${year}`;
  else periodLabel=`${year}`;
  const shiftLabel=shift?` | Shift: ${shift}`:'';
  const eqLabel=eq?` | Éq.${eq}`:'';
  const svcLabel=svc?` | ${svc}`:'';
  const titleLine=`${FR?'Récapitulatif des pointages du':'Attendance summary —'} ${periodLabel}${shiftLabel}${eqLabel}${svcLabel}`;

  if(!Object.keys(result).length)
    return`<div style="padding:40px;text-align:center;color:var(--text3)">${FR?'Aucune donnée':'No data'}</div>`;

  const totalActifs=Object.keys(result).length;

  /* Tableau croisé : lignes=fonctions, colonnes=types de pointage */
  function makeTable(empsList, deptLabel, nbEmps){
    const fcts=[...new Set(empsList.map(r=>r.fct))].sort();
    /* Totaux colonnes */
    const colTotals={};
    PT_TYPES.forEach(t=>{colTotals[t.k]=empsList.reduce((s,r)=>s+(r[t.k]||0),0);});
    const grandTotal=PT_TYPES.reduce((s,t)=>s+colTotals[t.k],0);

    function cellVal(v,eff){
      if(!v) return`<td style="padding:6px 8px;text-align:center;color:var(--text3)">—</td>`;
      const tx=eff>0?Math.round(v/eff*100):0;
      return`<td style="padding:5px 8px;text-align:center">
        <div style="font-weight:800;font-size:13px;color:${PT_TYPES.find(t=>t.k===arguments[2])?.col||'var(--primary)'}">${v}</div>
        <div style="font-size:9px;font-weight:600;opacity:.75;color:${PT_TYPES.find(t=>t.k===arguments[2])?.col||'var(--primary)'}">(${tx}%)</div>
      </td>`;
    }

    const rows=fcts.map((fct,i)=>{
      const empsF=empsList.filter(r=>r.fct===fct);
      const eff=empsF.length;
      const rowTotal=PT_TYPES.reduce((s,t)=>s+empsF.reduce((ss,r)=>ss+(r[t.k]||0),0),0);
      return`<tr style="border-bottom:1px solid var(--border);${i%2===1?'background:var(--surface2)':''}">
        <td style="padding:8px 12px;font-weight:600;font-size:12px;position:sticky;left:0;background:${i%2===1?'var(--surface2)':'var(--surface)'}">${fct}</td>
        <td style="padding:8px 8px;text-align:center;font-weight:700;font-size:12px;color:var(--text2)">${eff}</td>
        ${PT_TYPES.map(t=>{
          const v=empsF.reduce((s,r)=>s+(r[t.k]||0),0);
          const tx=eff>0&&v>0?Math.round(v/eff*100):0;
          return v>0
            ?`<td style="padding:5px 8px;text-align:center"><div style="font-weight:800;font-size:13px;color:${t.col}">${v}</div><div style="font-size:9px;font-weight:600;color:${t.col};opacity:.75">(${tx}%)</div></td>`
            :`<td style="padding:6px 8px;text-align:center;color:var(--text3)">—</td>`;
        }).join('')}
        <td style="padding:6px 8px;text-align:center;background:var(--primary)05;border-left:1px solid var(--primary)20">
          <div style="font-weight:800;font-size:14px;color:${rowTotal>0?'var(--primary)':'var(--text3)'}">${rowTotal||'—'}</div>
          ${rowTotal>0?`<div style="font-size:9px;color:var(--primary);opacity:.7">(${Math.round(rowTotal/eff*100)}%)</div>`:''}
        </td>
      </tr>`;
    }).join('');

    /* Ligne CUMUL TOTAL en bas */
    const cumulRow=`<tr style="border-top:3px solid var(--primary)">
      <td colspan="${2+PT_TYPES.length+1}" style="padding:0">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--primary)0d">
            <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:800;color:var(--primary);text-transform:uppercase;position:sticky;left:0;background:var(--primary)0d;min-width:130px">
              ${FR?'CUMUL TOTAL':'GRAND TOTAL'}
            </th>
            <th style="padding:8px 10px;text-align:center;font-size:11px;font-weight:700;color:var(--text2)">${FR?'Effectif':'Staff'}</th>
            ${PT_TYPES.map(t=>`<th style="padding:8px 8px;text-align:center;font-size:11px;font-weight:700;color:${t.col};min-width:80px">${t.k}<br><span style="font-size:9px;opacity:.8">${t.l}</span></th>`).join('')}
            <th style="padding:8px 10px;text-align:center;font-size:11px;font-weight:700;color:var(--primary)">Total</th>
          </tr></thead>
          <tbody><tr style="background:var(--primary)05">
            <td style="padding:10px 12px;font-weight:800;font-size:13px;color:var(--primary);position:sticky;left:0;background:var(--primary)05">${FR?'Cumul total':'Grand total'}</td>
            <td style="padding:10px;text-align:center"><div style="font-weight:800;font-size:16px">${nbEmps}</div><div style="font-size:10px;color:var(--text2)">100%</div></td>
            ${PT_TYPES.map(t=>{
              const v=colTotals[t.k];
              const tx=nbEmps>0&&v>0?Math.round(v/nbEmps*100):0;
              return v>0
                ?`<td style="padding:10px;text-align:center;background:${t.col}08"><div style="font-weight:800;font-size:16px;color:${t.col}">${v}</div><div style="font-size:10px;font-weight:700;color:${t.col};opacity:.8">${tx}%</div></td>`
                :`<td style="padding:10px;text-align:center;color:var(--text3);font-size:14px">—</td>`;
            }).join('')}
            <td style="padding:10px;text-align:center;background:var(--primary)">
              <div style="font-weight:800;font-size:16px;color:#fff">${grandTotal||'—'}</div>
              ${grandTotal?`<div style="font-size:10px;color:rgba(255,255,255,.8)">${Math.round(grandTotal/nbEmps*100)}%</div>`:''}
            </td>
          </tr></tbody>
        </table>
      </td>
    </tr>`;

    return`<div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:${180+PT_TYPES.length*90}px">
        <thead><tr>
          <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text2);background:var(--surface2);border-bottom:2px solid var(--border);white-space:nowrap;min-width:130px;position:sticky;left:0;z-index:2">${FR?'Fonction':'Position'}</th>

  /* ── DÉTAILS PAR DÉPARTEMENT ── */
  svcs.forEach(dept=>{
    const empsDept=Object.values(result).filter(r=>r.svc===dept);
    if(!empsDept.length) return;
    const nbEmps=empsDept.length;
    html+=`

  const recapTotals={};
  PT_TYPES.forEach(t=>{recapTotals[t.k]=allEmpsResult.reduce((s,r)=>s+(r[t.k]||0),0);});

    <div style="padding:14px 18px;background:var(--primary);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:var(--fh);font-weight:800;font-size:15px;color:#fff">

    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:${100+PT_TYPES.length*90+90}px">

          <tr style="background:var(--surface2)">
            <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text2);border-bottom:2px solid var(--border);min-width:80px;position:sticky;left:0;background:var(--surface2)">
              &nbsp;
            </th>
            ${PT_TYPES.map(t=>`
            <th style="padding:9px 10px;text-align:center;font-size:11px;font-weight:700;background:${t.col}18;color:${t.col};border-bottom:2px solid ${t.col}55;white-space:nowrap;min-width:90px">
              <div style="font-weight:800">${FR?'Total':'Total'} ${t.k}</div>
              <div style="font-size:9px;font-weight:500;opacity:.85">${t.l}</div>
              ${t.abs?`<div style="font-size:8px;background:rgba(239,68,68,.15);color:#dc2626;border-radius:5px;padding:1px 4px;margin-top:2px">≡ abs.</div>`:''}
            </th>`).join('')}
            <th style="padding:9px 10px;text-align:center;font-size:11px;font-weight:700;color:#fff;background:var(--primary);border-bottom:2px solid var(--primary);white-space:nowrap;min-width:90px">
              <div>${FR?'TOTAL':'TOTAL'}</div>

          </tr>
        </thead>
        <tbody>
          <!-- Ligne Total -->
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:12px 14px;font-weight:800;font-size:13px;color:var(--text);background:var(--surface2);position:sticky;left:0">
              ${FR?'Total':'Total'}
            </td>
            ${PT_TYPES.map(t=>{
              const v=recapTotals[t.k];
              return`<td style="padding:12px 10px;text-align:center">
                <div style="font-weight:800;font-size:22px;color:${v>0?t.col:'var(--text3)'}">${v>0?v:'—'}</div>
              </td>`;
            }).join('')}
            <td style="padding:12px 10px;text-align:center;background:var(--primary)0a">
              <div style="font-weight:800;font-size:22px;color:var(--primary)">${recapGrand||'—'}</div>
            </td>
          </tr>
          <!-- Ligne Taux -->
          <tr style="background:var(--surface2)">
            <td style="padding:12px 14px;font-weight:800;font-size:13px;color:var(--text);background:var(--surface2);position:sticky;left:0">
              ${FR?'Taux':'Rate'}
            </td>
            ${PT_TYPES.map(t=>{
              const v=recapTotals[t.k];
              const tx=totalEmpGlobal>0&&v>0?Math.round(v/totalEmpGlobal*100):0;

function expSynthPDF(){

  const date=document.getElementById('syn2_date')?.value||'';
  const month=parseInt(document.getElementById('syn2_month')?.value||new Date().getMonth()+1);
  const year=parseInt(document.getElementById('syn2_year')?.value||new Date().getFullYear());
  const shift=document.getElementById('syn2_shift')?.value||'';
  let periodLabel=mode==='day'?date:mode==='month'?`${T('months')[month-1]} ${year}`:`${year}`;
  const title=`${FR?'Synthèse des Pointages':'Attendance Summary'} — ${periodLabel}${shift?' | Shift: '+shift:''}`;

/* Export Synthèse Excel */
function expSynthExcel(){
  if(typeof XLSX==='undefined'){toast('XLSX non disponible','error');return;}
  const FR=lang==='fr';
  const mode=document.getElementById('syn2_mode')?.value||'day';
  const date=document.getElementById('syn2_date')?.value||new Date().toISOString().split('T')[0];
  const month=parseInt(document.getElementById('syn2_month')?.value||new Date().getMonth()+1);
  const year=parseInt(document.getElementById('syn2_year')?.value||new Date().getFullYear());
  const shift=document.getElementById('syn2_shift')?.value||'';
  const eq=document.getElementById('syn2_eq')?.value||'';
  const svc=document.getElementById('syn2_svc')?.value||'';
  const result=buildSyn2Keys(mode,date,month,year,shift,eq,svc);
  const svcs=svc?[svc]:SERVICES.filter(s=>actifs().some(e=>e.svc===s));
  const wb=XLSX.utils.book_new();
  function makeSheet(empsList){
    const fcts=[...new Set(empsList.map(r=>r.fct))].sort();
    const nbEmps=empsList.length;
    const header=[FR?'Fonction':'Position',FR?'Effectif':'Staff',...PT_TYPES.map(t=>`${t.k} (${t.l})`),FR?'Taux%':'Rate%','Total'];
    const rows=[header];
    fcts.forEach(fct=>{
      const empsF=empsList.filter(r=>r.fct===fct);
      const eff=empsF.length;
      const row=[fct,eff];
      let rowTotal=0;
      PT_TYPES.forEach(t=>{const v=empsF.reduce((s,r)=>s+(r[t.k]||0),0);row.push(v);rowTotal+=v;});
      row.push(eff>0?Math.round(rowTotal/eff*100)+'%':'—');
      row.push(rowTotal);
      rows.push(row);
    });
    const colTotals=PT_TYPES.map(t=>empsList.reduce((s,r)=>s+(r[t.k]||0),0));
    const grandTotal=colTotals.reduce((s,v)=>s+v,0);
    rows.push([FR?'CUMUL TOTAL':'GRAND TOTAL',nbEmps,...colTotals,nbEmps>0?Math.round(grandTotal/nbEmps*100)+'%':'—',grandTotal]);
    return XLSX.utils.aoa_to_sheet(rows);
  }
  XLSX.utils.book_append_sheet(wb,makeSheet(Object.values(result)),FR?'Global':'Global');
  svcs.forEach(dept=>{
    const empsDept=Object.values(result).filter(r=>r.svc===dept);
    if(!empsDept.length) return;
    XLSX.utils.book_append_sheet(wb,makeSheet(empsDept),dept.substring(0,30));
  });
  let periodLabel=mode==='day'?date:mode==='month'?`${T('months')[month-1]}_${year}`:`${year}`;
  XLSX.writeFile(wb,`Synthese_${periodLabel}${shift?'_'+shift:''}.xlsx`);
  toast(T('msg_export'),'success');
}

  const css=`<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;color:#111;padding:16px;font-size:10px}
    h1{font-size:14px;color:#1a56e8;margin-bottom:2px;font-weight:700}
    .sub{font-size:9px;color:#666;margin-bottom:10px}
    table{width:100%;border-collapse:collapse;margin-bottom:14px;page-break-inside:avoid}
    thead th{background:#e8eeff;padding:5px 7px;border:1px solid #bbb;font-size:8px;font-weight:700;text-transform:uppercase;color:#1a56e8;text-align:center;white-space:nowrap}
    thead th:first-child{text-align:left}

    .sec{font-size:11px;font-weight:700;color:#1a56e8;border-bottom:2px solid #1a56e8;padding-bottom:3px;margin:12px 0 6px}
    @page{margin:10mm;size:A4 ${landscape?'landscape':'portrait'}}
  </style>`;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>${css}</head><body>

    <div class="sub">PointageRH | ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}</div>

  setTimeout(()=>w.print(),600);
}
