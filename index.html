function expPTPDF(){
  const m=gM(),y=gY(),days=dim(m,y);
  const list=actifs();const dArr=Array.from({length:days},(_,i)=>i+1);
  const dayH=dArr.map(d=>`<th>${d}<br><span style="font-size:7px">${T('days')[dow(d,m,y)]}</span></th>`).join('');
  const rows=list.map((e,ri)=>{
    const ct=mPTfull(e,m,y);
    const cells=dArr.map(d=>{const v=ptd[`${e.mat}-${y}-${m}-${d}`]||'';const tp=getPT(v);return`<td style="${tp?'color:'+tp.col+';font-weight:700':'color:#aaa'}">${v||'·'}</td>`;}).join('');
    return`<tr><td>${ri+1}</td><td>${e.nom} ${e.pre}</td><td>${e.mat}</td><td>${e.svc}</td>${cells}<td>${ct._pres}</td><td>${ct._abs}</td></tr>`;
  }).join('');
  openPDF(`${T('pointage')} — ${T('months')[m-1]} ${y}`,`<table>
    <thead><tr><th>#</th><th>${T('col_name')}</th><th>${T('col_mat')}</th><th>${T('col_svc')}</th>${dayH}<th>P</th><th>A</th></tr></thead>
    <tbody>${rows}</tbody></table>`,true);
}

function expEmps(){
  const m=gM(),y=gY();
  const data=employees.map((e,i)=>{
    const ct=mPTfull(e,m,y);
    const row={[T('col_rank')]:i+1,[T('col_name')]:e.nom+' '+e.pre,[T('col_mat')]:e.mat,[T('col_svc')]:e.svc,[T('col_eq')]:e.eq,[T('col_fct')]:e.fct,[T('col_cnt')]:e.cnt,[T('col_st')]:e.st,[T('col_hire')]:e.de,[T('col_anc')]:anc(e.de,e.da)};
    PT_TYPES.forEach(t=>{row[`${t.k} (${t.l})`]=ct[t.k]||0;});
    row[T('col_absT')]=ct._abs;return row;
  });
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,T('employes'));
  XLSX.writeFile(wb,`${T('employes')}_${T('months')[m-1]}_${y}.xlsx`);toast(T('msg_export'),'success');
}

function expPT(){
  const m=gM(),y=gY(),days=dim(m,y);
  const rows=actifs().map(e=>{
    const row={[T('col_mat')]:e.mat,[T('col_name')]:e.nom+' '+e.pre,[T('col_svc')]:e.svc,[T('col_eq')]:e.eq,[T('col_fct')]:e.fct};
    for(let d=1;d<=days;d++) row[`J${d}`]=ptd[`${e.mat}-${y}-${m}-${d}`]||'';
    const ct=mPTfull(e,m,y);PT_TYPES.forEach(t=>{row[t.k]=ct[t.k]||0;});
    row[T('col_absT')]=ct._abs;return row;
  });
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,T('pointage'));
  XLSX.writeFile(wb,`${T('pointage')}_${T('months')[m-1]}_${y}.xlsx`);toast(T('msg_export'),'success');
}

function tFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen()}

/* ═══════════════════════════════════
   PARAMÈTRES
═══════════════════════════════════ */
function rParam(){
  if(!cfg.paramUnlocked){
    return`<div class="pwd-screen"><div class="pwd-box">
      <div class="pwd-icon"><i class="fa fa-lock"></i></div>
      <h2 style="font-family:var(--fh);font-weight:700;margin-bottom:8px">${T('paramTitle')}</h2>
      <p class="sm cm mb3">${T('paramDesc')}</p>
      <input type="password" class="fc" id="paramPwd" placeholder="${T('paramPlaceholder')}" style="text-align:center;letter-spacing:4px;font-size:18px;margin-bottom:12px" onkeydown="if(event.key==='Enter')unlockParam()">
      <div id="paramErr" style="color:#ef4444;font-size:12px;margin-bottom:10px;display:none"><i class="fa fa-circle-xmark"></i> ${T('wrongPwd')}</div>
      <button class="btn bp wf" onclick="unlockParam()"><i class="fa fa-unlock"></i> ${T('paramBtn')}</button>
    </div></div>`;
  }

  const themes=[
    {id:'ocean',  n:'Ocean',  sb:'#0f172a',mn:'#f0f4ff',ac:'#1a56e8'},
    {id:'violet', n:'Violet', sb:'#1e1033',mn:'#f5f3ff',ac:'#7c3aed'},
    {id:'foret',  n:'Forêt',  sb:'#052e16',mn:'#f0fdf4',ac:'#059669'},
    {id:'rouge',  n:'Rubis',  sb:'#1c0a0a',mn:'#fff5f5',ac:'#dc2626'},
    {id:'ardoise',n:'Ardoise',sb:'#1e293b',mn:'#f1f5f9',ac:'#475569'},
    {id:'nuit',   n:'Nuit',   sb:'#020617',mn:'#0f172a',ac:'#38bdf8'},
  ];

  function pList(id,arr,addFn,rmFn,ph){
    return`<div class="pl">${arr.map((v,i)=>`<div class="pi"><span class="pn">${v}</span><button class="btn bsm bd bic" onclick="${rmFn}(${i})"><i class="fa fa-xmark"></i></button></div>`).join('')}</div>
    <div class="padd"><input type="text" class="fc" id="inp-${id}" placeholder="${ph}" style="flex:1"><button class="btn bp bsm" onclick="${addFn}()"><i class="fa fa-plus"></i> ${T('btn_addItem')}</button></div>`;
  }

  const ptSec=`<div class="card" style="grid-column:1/-1">
    <div class="ch"><div class="ct"><i class="fa fa-tag cp"></i> ${T('sec_ptypes')}</div><button class="btn bp bsm" onclick="openNewPT()"><i class="fa fa-plus"></i> ${T('btn_newType')}</button></div>
    <div class="cb"><p class="xs cm mb3">${T('absNote')}</p>
    ${PT_TYPES.map((t,i)=>`<div class="ptpc">
      <input type="color" class="ptcd" value="${t.col}" onchange="PT_TYPES[${i}].col=this.value;rerender()" title="${T('lbl_color')}">
      <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-weight:800;font-size:14px;color:${t.col};font-family:var(--fh)">${t.k}</span>
        <input type="text" value="${t.l}" style="border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;background:var(--surface);color:var(--text);outline:none;width:140px" onchange="PT_TYPES[${i}].l=this.value;rerender()">
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap">
          <input type="checkbox"${t.abs?' checked':''} onchange="PT_TYPES[${i}].abs=this.checked;rerender()">
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:${t.abs?'rgba(239,68,68,.15)':'rgba(100,116,139,.1)'};color:${t.abs?'#dc2626':'#64748b'}">${t.abs?T('lbl_isAbsTag'):T('lbl_notAbs')}</span>
        </label>
      </div></div>
      ${PT_TYPES.length>2?`<button class="btn bsm bd bic" onclick="rmPT(${i})"><i class="fa fa-trash"></i></button>`:''}
    </div>`).join('')}
    </div></div>`;

  return`
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn bd bsm" onclick="cfg.paramUnlocked=false;render('parametres')"><i class="fa fa-lock"></i> ${T('lockParam')}</button>
  </div>
  <div class="sgrid2">
    <!-- Thèmes -->
    <div class="card"><div class="ch"><div class="ct"><i class="fa fa-palette cp"></i> ${T('sec_themes')}</div></div>
      <div class="cb"><div class="thgrid">${themes.map(t=>`<div class="thcard${cfg.theme===t.id?' active':''}" onclick="applyTh('${t.id}')">
        <div class="thp"><div class="thps" style="background:${t.sb}"></div><div class="thpm" style="background:${t.mn}"><div style="height:14px;background:#fff;border-bottom:1px solid #e2e8f6;display:flex;align-items:center;padding:0 5px"><div style="width:28px;height:3px;border-radius:2px;background:${t.ac}"></div></div></div></div>
        <div class="thn">${t.n} ${cfg.theme===t.id?'✓':''}</div>
      </div>`).join('')}</div></div>
    </div>

    <!-- Services -->
    <div class="card"><div class="ch"><div class="ct"><i class="fa fa-building cp"></i> ${T('sec_svc')}</div></div>
      <div class="cb">${pList('svc',SERVICES,'addSvc','rmSvc',T('ph_svc'))}</div>
    </div>

    <!-- Fonctions -->
    <div class="card"><div class="ch"><div class="ct"><i class="fa fa-briefcase cp"></i> ${T('sec_fct')}</div></div>
      <div class="cb">${pList('fct',FONCTIONS,'addFct','rmFct',T('ph_fct'))}</div>
    </div>

    <!-- Sous-Fonctions -->
    <div class="card"><div class="ch"><div class="ct"><i class="fa fa-tag cp"></i> ${T('sec_sfct')}</div></div>
      <div class="cb">${pList('sfct',SOUS_FCT,'addSFct','rmSFct',T('ph_sfct'))}</div>
    </div>

    <!-- Jours Fériés -->
    <div class="card"><div class="ch"><div class="ct"><i class="fa fa-calendar-days cp"></i> ${T('sec_hol')}</div></div>
      <div class="cb">
        <div class="pl">${feries.map(h=>`<div class="pi"><span class="pn"><i class="fa fa-star" style="color:var(--warning);font-size:11px"></i> ${h}</span><button class="btn bsm bd bic" onclick="rmFer('${h}')"><i class="fa fa-xmark"></i></button></div>`).join('')}</div>
        <div class="padd"><input type="date" class="fc" id="inp-fer" style="flex:1"><button class="btn bp bsm" onclick="addFer()"><i class="fa fa-plus"></i></button></div>
      </div>
    </div>

    <!-- Shifts -->
    <div class="card"><div class="ch"><div class="ct"><i class="fa fa-clock cp"></i> ${T('sec_shifts')}</div></div>
      <div class="cb">
        ${cfg.shifts.map((s,i)=>`<div class="pi mb3"><div><span class="tag tbl2" style="margin-right:6px">${s.n}</span><span class="xs cm">${s.s} → ${s.e}</span></div><div class="flex g2"><button class="btn bsm bg2 bic" onclick="editSh(${i})"><i class="fa fa-pencil"></i></button><button class="btn bsm bd bic" onclick="cfg.shifts.splice(${i},1);render('parametres')"><i class="fa fa-trash"></i></button></div></div>`).join('')}
        <button class="btn bo bsm mt3" onclick="addSh()"><i class="fa fa-plus"></i> ${T('btn_addShift')}</button>
      </div>
    </div>

    <!-- Changer mot de passe -->
    <div class="card"><div class="ch"><div class="ct"><i class="fa fa-lock cp"></i> ${T('sec_pwd')}</div></div>
      <div class="cb">
        <div class="fg"><label class="fl">${T('lbl_curPwd')}</label><input type="password" class="fc" id="pc" placeholder="••••"></div>
        <div class="fg"><label class="fl">${T('lbl_newPwd')}</label><input type="password" class="fc" id="pn" placeholder="••••"></div>
        <div class="fg"><label class="fl">${T('lbl_confPwd')}</label><input type="password" class="fc" id="pk" placeholder="••••"></div>
        <button class="btn bp" onclick="chPwd()"><i class="fa fa-key"></i> ${T('btn_chgPwd')}</button>
      </div>
    </div>

    <!-- Types de Pointage -->
    ${ptSec}
  </div>`;
}

function unlockParam(){
  const pwd=document.getElementById('paramPwd')?.value;
  if(pwd!==cfg.pwd){
    const e=document.getElementById('paramErr');
    if(e){e.style.display='block';setTimeout(()=>e.style.display='none',2500);}
    return;
  }
  cfg.paramUnlocked=true;
  render('parametres');
  toast(T('msg_paramOk'),'success');
}

function openNewPT(){
  document.getElementById('mTit').textContent=T('newPTTitle');
  document.getElementById('modal').className='modal';
  document.getElementById('mBod').innerHTML=`
    <div class="fr">
      <div class="fg"><label class="fl">${T('lbl_abbr')}</label><input class="fc" id="ptk" placeholder="HS" maxlength="4" oninput="this.value=this.value.toUpperCase()"></div>
      <div class="fg"><label class="fl">${T('lbl_lbl')}</label><input class="fc" id="ptl" placeholder="Heures Sup."></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">${T('lbl_color')}</label><input type="color" class="fc" id="ptc" value="#6366f1" style="height:42px;cursor:pointer"></div>
      <div class="fg" style="display:flex;align-items:center;padding-top:20px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600"><input type="checkbox" id="ptabs"> ${T('lbl_isAbs')}</label></div>
    </div>`;
  document.getElementById('mFtr').innerHTML=`<button class="btn bg2" onclick="closeM()">${T('cancel')}</button><button class="btn bp" onclick="savePT()"><i class="fa fa-plus"></i> ${T('btn_create')}</button>`;
  openM();
}
function savePT(){
  const k=document.getElementById('ptk')?.value?.trim().toUpperCase();
  const l=document.getElementById('ptl')?.value?.trim();
  const col=document.getElementById('ptc')?.value||'#6366f1';
  const abs=document.getElementById('ptabs')?.checked||false;
  if(!k||!l){toast(T('msg_abbrvReq'),'error');return;}
  if(PT_TYPES.find(t=>t.k===k)){toast(`"${k}" ${T('msg_abbrvExists')}`,'error');return;}
  PT_TYPES.push({k,l,col,abs});
  closeM();render('parametres');
  toast(`"${k}" ${T('msg_typeCreated')}`,'success');
}
function rmPT(i){if(!confirm(`${T('msg_ptDel')} "${PT_TYPES[i].k}" ?`))return;PT_TYPES.splice(i,1);render('parametres');}
function addSvc(){const v=document.getElementById('inp-svc')?.value?.trim();if(!v)return;if(!SERVICES.includes(v))SERVICES.push(v);render('parametres');toast(T('msg_svcAdded'),'success');}
function rmSvc(i){if(!confirm(`Supprimer "${SERVICES[i]}" ?`))return;SERVICES.splice(i,1);render('parametres');}
function addFct(){const v=document.getElementById('inp-fct')?.value?.trim();if(!v)return;if(!FONCTIONS.includes(v))FONCTIONS.push(v);render('parametres');toast(T('msg_fctAdded'),'success');}
function rmFct(i){if(!confirm(`Supprimer "${FONCTIONS[i]}" ?`))return;FONCTIONS.splice(i,1);render('parametres');}
function addSFct(){const v=document.getElementById('inp-sfct')?.value?.trim();if(!v)return;if(!SOUS_FCT.includes(v))SOUS_FCT.push(v);render('parametres');toast(T('msg_sfctAdded'),'success');}
function rmSFct(i){if(!confirm(`Supprimer "${SOUS_FCT[i]}" ?`))return;SOUS_FCT.splice(i,1);render('parametres');}
function addFer(){const v=document.getElementById('inp-fer')?.value;if(!v)return;if(!feries.includes(v)){feries.push(v);feries.sort();}render('parametres');toast(T('msg_holAdded'),'success');}
function rmFer(h){feries=feries.filter(x=>x!==h);render('parametres');}
function addSh(){
  document.getElementById('mTit').textContent=T('shiftAdd');
  document.getElementById('modal').className='modal';
  document.getElementById('mBod').innerHTML=`
    <div class="fg"><label class="fl">${T('lbl_shiftName')}</label><input class="fc" id="sn" placeholder="Nuit"></div>
    <div class="fr">
      <div class="fg"><label class="fl">${T('lbl_shiftStart')}</label><input type="time" class="fc" id="ss" value="22:00"></div>
      <div class="fg"><label class="fl">${T('lbl_shiftEnd')}</label><input type="time" class="fc" id="se" value="06:00"></div>
    </div>`;
  document.getElementById('mFtr').innerHTML=`<button class="btn bg2" onclick="closeM()">${T('cancel')}</button><button class="btn bp" onclick="saveSh(null)">${T('btn_addItem')}</button>`;
  openM();
}
function editSh(i){
  const s=cfg.shifts[i];
  document.getElementById('mTit').textContent=T('shiftEdit');
  document.getElementById('modal').className='modal';
  document.getElementById('mBod').innerHTML=`
    <div class="fg"><label class="fl">${T('lbl_shiftName')}</label><input class="fc" id="sn" value="${s.n}"></div>
    <div class="fr">
      <div class="fg"><label class="fl">${T('lbl_shiftStart')}</label><input type="time" class="fc" id="ss" value="${s.s}"></div>
      <div class="fg"><label class="fl">${T('lbl_shiftEnd')}</label><input type="time" class="fc" id="se" value="${s.e}"></div>
    </div>`;
  document.getElementById('mFtr').innerHTML=`<button class="btn bg2" onclick="closeM()">${T('cancel')}</button><button class="btn bp" onclick="saveSh(${i})">${T('save')}</button>`;
  openM();
}
function saveSh(idx){
  const n=document.getElementById('sn').value.trim();
  const s=document.getElementById('ss').value;
  const e=document.getElementById('se').value;
  if(!n){toast(T('msg_shiftNameReq'),'error');return;}
  if(idx===null) cfg.shifts.push({n,s,e});
  else cfg.shifts[idx]={n,s,e};
  closeM();render('parametres');
  toast(T('msg_shiftSaved'),'success');
}
function applyTh(t){
  cfg.theme=t;
  localStorage.setItem('prhTheme',t);
  document.body.setAttribute('data-theme',t);
  render('parametres');
  toast(`${T('theme_lbl')} ${t}`,'success');
}
function chPwd(){
  const c=document.getElementById('pc').value;
  const n=document.getElementById('pn').value;
  const k=document.getElementById('pk').value;
  if(c!==cfg.pwd){toast(T('msg_pwdWrong'),'error');return;}
  if(n!==k){toast(T('msg_pwdMismatch'),'error');return;}
  if(n.length<4){toast(T('msg_pwdShort'),'error');return;}
  cfg.pwd=n;
  toast(T('msg_pwdOk'),'success');
}

window.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();
  /* Init mois */
  const gm=document.getElementById('gM');
  T('mshort').forEach((mn,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=mn;if(i+1===now.getMonth()+1)o.selected=true;gm.appendChild(o);});
  document.getElementById('gY').value=now.getFullYear();
  /* Apply lang */
  applyLangUI();
  go('dashboard');
});
